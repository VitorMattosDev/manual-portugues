          - capitulos/cap-07-fonema-e-letra.qmd
          - capitulos/cap-08-classificacao-fonemas.qmd
          - capitulos/cap-09-encontros-digrafos.qmd
          - capitulos/cap-10-silaba-divisao-tonicidade.qmd
          - capitulos/cap-11-processos-fonologicos.qmd
          - capitulos/cap-12-ortoepia-prosodia.qmd
          - capitulos/cap-13-fonetica-articulatoria-trapezio.qmd

