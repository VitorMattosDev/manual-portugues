bibliography: referencias.bib
csl: abnt.csl

filters:
  - danmackinlay/tikz
  - quarto

tikz:
  svg-engine: dvisvgm
  cache: true

format:
  html:
    theme:
      - cosmo
      - styles.css
    toc: true
    toc-title: "Nesta página"
    number-sections: true
    fig-cap-location: bottom
    code-copy: true
    smooth-scroll: true
  pdf:
    documentclass: scrbook
    papersize: a4
    number-sections: true
    toc: true
    lang: pt-BR
    include-in-header:
      text: |
        \usepackage{amsmath}
        \usepackage{amsfonts}
