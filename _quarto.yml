project:
  type: book
  output-dir: _book

lang: pt

book:
  title: "Manual de Língua Portuguesa"
  subtitle: "Série Manuais de Ciências"
  author: "Série Manuais de Ciências"
  date: today
  date-format: "YYYY"
  search: true
  repo-url: https://github.com/vitormattosdev/manual-portugues
  repo-actions: [edit, issue]
  page-navigation: true
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
      - index.qmd
      - part: "Volume 1 — Introdução aos Estudos da Linguagem"
        chapters:
          - capitulos/cap-01-linguagem-lingua-fala.qmd
          - capitulos/cap-02-linguistica-gramatica.qmd
          - capitulos/cap-03-norma-culta-padrao-variedades.qmd
