name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Install required LaTeX packages
        run: |
          # tlmgr em bin/ é um symlink, então NÃO usar -find -type f.
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          TLMGR="$(command -v tlmgr || true)"
          if [ -z "$TLMGR" ]; then
            TLMGR="$(find -L "$HOME" /opt /root -name tlmgr 2>/dev/null | head -n1)"
          fi
          echo "Using tlmgr at: $TLMGR"
          # tlnet costuma estar à frente do tlmgr do TinyTeX; atualizar antes de instalar.
          "$TLMGR" update --self
          "$TLMGR" install standalone pgf pgfplots dvisvgm xcolor amsmath amsfonts
          # Persistir o bin do TinyTeX no PATH dos passos seguintes (render).
          # Sem isto, o filtro TikZ falha com "pdflatex/dvisvgm not found on PATH".
          echo "$(dirname "$TLMGR")" >> "$GITHUB_PATH"

      - name: Install Chrome (headless shell for Mermaid)
        run: quarto install chrome-headless-shell

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
